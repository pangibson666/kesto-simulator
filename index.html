<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kesto Maker & Player</title>
<style>
  /* 專業級暗色主題變數設定 */
  :root {
    --bg-base: #121212;       
    --bg-surface: #1e1e1e;    
    --bg-inset: #1a1a1a;      
    
    --border-subtle: #2d2d2d; 
    --border-muted: #3d3d3d;
    
    --text-primary: #e0e0e0;
    --text-secondary: #888888;
    
    --accent-primary: #5fa8eb;
    --accent-hover: #4a90e2;
    --accent-danger: #e24a4a;

    --btn-primary-bg: #3870a8;
    --btn-primary-hover: #2a5582;
    
    --game-cell: #2b2b2b;     
    --game-wall: #5c5c5c;     
    --game-block: #f0a34b;
    --game-target-border: #5fa8eb; 
    --game-target-fill: #5fa8eb;   
  }

  * { 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
  }

  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: var(--border-muted);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--text-secondary);
  }

  body {
    background-color: var(--bg-base);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center; 
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none; /* 全局禁止反白選取 */
  }

  .scale-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    padding: 40px 20px;
    transform-origin: center center;
  }

  @media (min-width: 1300px) and (min-height: 800px) { .scale-wrapper { transform: scale(1.15); } }
  @media (min-width: 1600px) and (min-height: 900px) { .scale-wrapper { transform: scale(1.3); } }

  .app-container {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: stretch;
    gap: 32px;
    max-width: 1200px;
    width: 100%;
    transition: all 0.3s ease;
  }

  .panel {
    background-color: var(--bg-surface);
    border: 1px solid var(--border-muted);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  
  .side-panel {
    flex: 1;
    min-width: 280px;
    max-width: 340px;
  }

  .center-panel {
    flex: 0 0 auto;
    width: 400px;
    align-items: center;
  }

  .panel-header { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; text-align: center; width: 100%; }
  .panel-subheader {
    font-size: 12px; color: var(--text-secondary); text-transform: uppercase;
    letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px;
    border-bottom: 1px solid var(--border-subtle); padding-bottom: 8px;
  }

  #game-board {
    display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px);
    gap: 4px; background-color: var(--bg-inset); padding: 8px; border-radius: 8px;
    border: 1px solid var(--border-subtle); position: relative; touch-action: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }
  
  #game-board.locked { border-color: var(--border-muted); }

  .cell {
    width: 40px; height: 40px; background-color: var(--game-cell);
    border-radius: 6px; cursor: pointer; transition: background-color 0.15s;
  }
  @media (hover: hover) { .cell:hover { background-color: #383838; } }
  .locked .cell { cursor: not-allowed; }

  .dynamic-block { position: absolute; width: 40px; height: 40px; border-radius: 6px; pointer-events: none; }
  .wall { background-color: var(--game-wall); z-index: 10; }
  .target { background-color: transparent; border: 3px solid var(--game-target-border); z-index: 5; }
  .orange { background-color: var(--game-block); z-index: 20; }
  .orange.on-target { background-color: var(--game-target-fill); border: none; box-shadow: none; }

  .btn {
    background-color: transparent; color: var(--text-primary); border: 1px solid var(--border-muted);
    padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center;
    justify-content: center; gap: 6px;
  }
  .btn:hover:not(:disabled) { background-color: var(--border-subtle); color: #fff; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .btn-primary { background-color: var(--btn-primary-bg); color: #fff; border-color: var(--btn-primary-bg); font-weight: 600; }
  .btn-primary:hover:not(:disabled) { background-color: var(--btn-primary-hover); border-color: var(--btn-primary-hover); }

  .btn-danger { background-color: transparent; color: var(--accent-danger); border-color: var(--border-muted); }
  .btn-danger:hover { background-color: #2a1111; border-color: var(--accent-danger); }

  .btn-text { background: none; border: none; padding: 4px 8px; color: var(--text-secondary); }
  .btn-text:hover { color: var(--text-primary); background-color: var(--border-subtle); }

  .tool-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .tool-btn { 
    background-color: var(--bg-inset); border: 1px solid var(--border-subtle); 
    height: 44px; padding: 0; display: flex; justify-content: center; align-items: center;
  }
  .tool-btn.active { background-color: var(--border-muted); border-color: var(--text-secondary); }
  
  .tool-icon { 
    width: 28px; height: 28px; border-radius: 4px; box-sizing: border-box; 
  }
  .tool-icon-erase { background-color: var(--game-cell); }
  .tool-icon-wall { background-color: var(--game-wall); }
  .tool-icon-target { background-color: transparent; border: 2px solid var(--game-target-border); }
  .tool-icon-start { background-color: var(--game-block); }

  .slider-container { display: flex; flex-direction: column; gap: 8px; padding: 4px 0; margin-bottom: 8px; }
  .slider-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-secondary); }
  .slider-header-left { font-weight: 600; }
  .slider-label { font-family: monospace; font-size: 12px; color: var(--text-primary); }
  input[type="range"] { width: 100%; margin: 0; accent-color: var(--accent-primary); cursor: pointer; }

  .game-controls {
    display: none; flex-direction: column; gap: 12px; background-color: var(--bg-surface);
    padding: 0; border: none; margin-top: 8px; flex: 1;
  }
  .control-row { display: flex; justify-content: space-between; align-items: center; gap: 4px; }
  .control-indicator { font-family: monospace; font-size: 14px; color: var(--text-primary); min-width: 50px; text-align: center; transition: color 0.3s ease; }

  /* 歷史足跡面板 UI */
  .path-container {
    display: grid; 
    grid-template-columns: repeat(5, 1fr); 
    gap: 6px; 
    height: 140px; 
    position: relative; 
    overflow-y: auto; 
    background: var(--bg-inset); 
    padding: 8px; 
    border-radius: 6px; 
    border: 1px solid var(--border-subtle);
    margin-top: 4px; 
    align-content: start; 
  }
  .path-chip {
    background-color: var(--bg-surface); 
    border: 1px solid var(--border-muted); 
    color: var(--text-secondary);
    padding: 4px 0; 
    border-radius: 4px; 
    font-size: 11px; 
    cursor: pointer; 
    font-family: monospace; 
    transition: all 0.15s;
    display: flex; 
    align-items: center; 
    justify-content: center; 
    width: 100%; 
    box-sizing: border-box;
  }
  .path-chip.start-chip {
    grid-column: 1 / -1; 
    padding: 6px 0;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .path-chip:hover { background-color: var(--border-subtle); color: var(--text-primary); }
  .path-chip.active { background-color: var(--accent-primary); color: #fff; border-color: var(--accent-primary); font-weight: bold; }
  .path-chip.future { opacity: 0.4; border-style: dashed; }

  /* 質感彈出視窗 (Modal) */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: none; justify-content: center; align-items: center; z-index: 10000;
    opacity: 0; transition: opacity 0.2s ease;
  }
  .modal-overlay.active { display: flex; opacity: 1; }
  .modal-box {
    background: var(--bg-surface); border: 1px solid var(--border-subtle);
    padding: 24px; border-radius: 12px; width: 90%; max-width: 360px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    transform: translateY(20px); transition: transform 0.2s ease; display: flex; flex-direction: column; gap: 16px;
  }
  .modal-overlay.active .modal-box { transform: translateY(0); }
  .modal-title { font-weight: 600; font-size: 16px; color: var(--text-primary); }
  
  .modal-msg { 
    font-size: 14px; 
    color: var(--text-secondary); 
    line-height: 1.5; 
    word-wrap: break-word; 
    white-space: pre-wrap; 
    
    /* 允許文字反白選取與複製 */
    user-select: text;
    -webkit-user-select: text;
  }
  
  .modal-input {
    background: var(--bg-inset); border: 1px solid var(--border-subtle);
    color: var(--text-primary); padding: 10px; border-radius: 6px; width: 100%; outline: none; font-family: monospace;
  }
  .modal-input:focus { border-color: var(--accent-primary); }
  .modal-buttons { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; }

  /* 手機版排版優化 */
  @media (max-width: 1024px) {
    .scale-wrapper { transform: none !important; padding: 20px 10px; align-items: flex-start; }
    .app-container { flex-direction: column; align-items: center; gap: 20px; }
    .side-panel, .center-panel { width: 100%; max-width: 416px; flex: auto; }
    .center-panel { order: 1; }
    .left-panel { order: 2; }
    .right-panel { order: 3; }
  }
</style>
</head>
<body>

<div class="scale-wrapper">
<div class="app-container">
  
  <!-- 左側：工具與設定 -->
  <div class="panel side-panel left-panel">
    <div>
      <div class="panel-subheader">Tools</div>
      <div class="tool-grid">
        <button class="btn tool-btn" id="btn-tool-erase" onclick="setTool('erase', this)" title="Empty / Eraser">
            <div class="tool-icon tool-icon-erase"></div>
        </button>
        <button class="btn tool-btn active" id="btn-tool-wall" onclick="setTool('wall', this)" title="Wall">
            <div class="tool-icon tool-icon-wall"></div>
        </button>
        <button class="btn tool-btn" id="btn-tool-target" onclick="setTool('target', this)" title="Target">
            <div class="tool-icon tool-icon-target"></div>
        </button>
        <button class="btn tool-btn" id="btn-tool-start" onclick="setTool('start', this)" title="Block">
            <div class="tool-icon tool-icon-start"></div>
        </button>
      </div>
      <div style="margin-top: 16px; display:flex;">
        <button class="btn" onclick="clearBoard()" style="flex:1;">Clear Board</button>
      </div>
    </div>

    <div>
      <div class="panel-subheader">Settings</div>
      
      <!-- 動畫速度控制 -->
      <div class="slider-container">
        <div class="slider-header">
            <span class="slider-header-left">Anim Speed</span>
            <div class="slider-header-right">
                <span id="anim-speed-label" class="slider-label">100ms</span>
            </div>
        </div>
        <input type="range" id="anim-speed-slider" min="0" max="500" value="100" step="10" oninput="updateSettingsUI()" onchange="if(stateLoaded) saveState()">
      </div>
    </div>
  </div>

  <!-- 中間：遊戲面板 -->
  <div class="panel center-panel">
    <div class="panel-header">Workspace</div>
    
    <div id="game-board"></div>
    
    <div style="display:flex; justify-content: center; gap:16px; width: 100%; margin-top: 8px;">
        <button class="btn btn-text" onclick="copyMapText()">Export Code</button>
        <button class="btn btn-text" onclick="importMapText()">Import Code</button>
    </div>

    <!-- 遊玩模式開關 -->
    <button class="btn btn-primary" id="btn-play-mode" onclick="togglePlayMode()" style="width:100%; margin-top:12px; font-weight:600;">
        Play Map
    </button>
  </div>

  <!-- 右側：遊玩控制與狀態 -->
  <div class="panel side-panel right-panel" style="display:flex; flex-direction:column;">
    
    <!-- 編輯模式說明 -->
    <div id="edit-instructions" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; color: var(--text-secondary); gap: 12px;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
        <div style="font-weight: 600; color: var(--text-primary); font-size: 15px;">Edit Mode</div>
        <div style="font-size: 13px; line-height: 1.5;">Design your map by placing walls, targets, and blocks.<br><br>Click <b>Play Map</b> to test your level.</div>
    </div>

    <!-- 遊玩控制面板 -->
    <div id="play-panel" class="game-controls">
      <div class="panel-subheader" style="border:none; margin:0; padding:0;">Play Controls</div>
      
      <div class="control-row">
        <button class="btn" onclick="jumpToStep(-1)" title="First Step">&lt;&lt;</button>
        <button class="btn" onclick="playerUndo()" title="Previous Step (Ctrl+Z)">&lt;</button>
        <span id="step-indicator" class="control-indicator">0 / 0</span>
        <button class="btn" onclick="playerRedo()" title="Next Step">&gt;</button>
        <button class="btn" onclick="jumpToStep(playHistory.length - 1)" title="Last Step">&gt;&gt;</button>
      </div>

      <div class="slider-container" style="margin-top: 4px;">
        <div class="slider-header">
            <span class="slider-header-left">Replay Speed</span>
            <span id="speed-label" class="slider-label">1.00x</span>
        </div>
        <input type="range" id="speed-slider" min="0.25" max="1.75" value="1.00" step="0.05" oninput="updateSpeed()" onchange="if(stateLoaded) saveState()">
      </div>

      <div style="display: flex; gap: 8px;">
          <button class="btn btn-primary" id="btn-history-play" onclick="toggleHistoryPlay()" style="flex: 1;">Auto Replay</button>
      </div>
      
      <!-- 歷史足跡 UI -->
      <div id="path-display" class="path-container"></div>
      
      <div style="font-size: 11px; color: var(--text-secondary); text-align: center; margin-top: auto; padding-top: 10px;">
          Tip: Use Keyboard Arrows / WASD / Swipe
      </div>
    </div>
  </div>

</div>
</div>

<!-- 自訂彈出視窗 (Modal) -->
<div id="custom-modal" class="modal-overlay">
  <div class="modal-box">
    <div id="modal-title" class="modal-title"></div>
    <div id="modal-msg" class="modal-msg"></div>
    <input type="text" id="modal-input" class="modal-input" autocomplete="off" spellcheck="false">
    <div class="modal-buttons">
      <button class="btn" id="modal-btn-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-btn-confirm">Confirm</button>
    </div>
  </div>
</div>

<script>
// ==========================================
// 全域變數
// ==========================================
let globalAnimSpeed = 100;
let stateLoaded = false;
let playHistoryTimer = null; 

let boardData = { walls: [], start: [], target: [] };
let currentTool = 'wall';
let isMouseDown = false;
let boardLocked = false; 

// Play Mode 變數
let isPlayMode = false;
let playInitialState = [];
let playHistory = [];
let currentStepIndex = -1; 
let isPrompting = false;   
let playDelay = 300; 
let blockIdCounter = 0;

// ==========================================
// 0. Custom Modal UI (自訂彈窗系統)
// ==========================================
let modalResolve = null;
function showModal({ title, msg, type, value="" }) {
    return new Promise((resolve) => {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
        const inputEl = document.getElementById('modal-input');
        const cancelBtn = document.getElementById('modal-btn-cancel');
        
        if (type === 'prompt') {
            inputEl.style.display = 'block'; inputEl.value = value;
            setTimeout(() => inputEl.focus(), 50);
        } else {
            inputEl.style.display = 'none';
        }
        
        if (type === 'alert') cancelBtn.style.display = 'none';
        else cancelBtn.style.display = 'block';

        document.getElementById('custom-modal').classList.add('active');
        modalResolve = resolve;
    });
}
function closeModal(val) {
    document.getElementById('custom-modal').classList.remove('active');
    if (modalResolve) { modalResolve(val); modalResolve = null; }
}
document.getElementById('modal-btn-confirm').onclick = () => {
    let inputEl = document.getElementById('modal-input');
    closeModal(inputEl.style.display !== 'none' ? inputEl.value : true);
};
document.getElementById('modal-btn-cancel').onclick = () => closeModal(false);

async function customAlert(title, msg) { await showModal({title, msg, type: 'alert'}); }
async function customConfirm(title, msg, onYes) { if(await showModal({title, msg, type: 'confirm'})) onYes(); }
async function customPrompt(title, msg, onResult) { 
    let res = await showModal({title, msg, type: 'prompt'});
    if(res !== false && res !== null) onResult(res);
}

// ==========================================
// 1. LocalStorage State Manager
// ==========================================
function saveState() {
    let bData = boardData;
    if (isPlayMode) {
        bData = { walls: boardData.walls, target: boardData.target, start: playInitialState };
    }
    const state = {
        boardData: bData,
        settings: {
            animSpeed: document.getElementById('anim-speed-slider').value
        },
        playState: {
            active: isPlayMode,
            initial: playInitialState,
            history: playHistory,
            stepIndex: currentStepIndex
        }
    };
    localStorage.setItem('kesto_game_state', JSON.stringify(state));
}

function loadState() {
    const data = localStorage.getItem('kesto_game_state');
    if (data) {
        try {
            const state = JSON.parse(data);
            if (state.boardData) {
                boardData = state.boardData;
                let maxId = -1;
                boardData.start.forEach(b => { if (b[2] > maxId) maxId = b[2]; });
                blockIdCounter = maxId + 1;
            }
            if (state.settings) {
                document.getElementById('anim-speed-slider').value = state.settings.animSpeed;
                updateSettingsUI();
            }
            if (state.playState && state.playState.active) {
                isPlayMode = true;
                playInitialState = state.playState.initial;
                playHistory = state.playState.history;
                currentStepIndex = state.playState.stepIndex;
            }
        } catch (e) { console.error("Failed to load state", e); }
    }
}

// ==========================================
// 2. 主程式與 UI 互動邏輯 
// ==========================================
const GRID_SIZE = 8, CELL_SIZE = 40, GAP = 4, PADDING = 8;

function updateSettingsUI() {
    globalAnimSpeed = parseInt(document.getElementById('anim-speed-slider').value);
    document.getElementById('anim-speed-label').innerText = globalAnimSpeed + "ms";
}

function lockBoard() {
    boardLocked = true;
    document.getElementById('game-board').classList.add('locked');
    document.querySelectorAll('.tool-btn').forEach(b => b.disabled = true);
}
function unlockBoard() {
    if (isPlayMode) return; 
    boardLocked = false;
    document.getElementById('game-board').classList.remove('locked');
    document.querySelectorAll('.tool-btn').forEach(b => b.disabled = false);
}

let lastTouchCell = null; 

function initBoard() {
    const board = document.getElementById('game-board');
    board.innerHTML = '';
    board.addEventListener('touchmove', handleTouchMove, {passive: false});
    
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.r = r; cell.dataset.c = c;
            cell.onmousedown = (e) => { e.preventDefault(); isMouseDown = true; applyTool(r, c); };
            cell.onmouseenter = (e) => { if(isMouseDown) applyTool(r, c); };
            cell.addEventListener('touchstart', (e) => {
                e.preventDefault(); isMouseDown = true; applyTool(r, c); lastTouchCell = cell;
            }, {passive: false});
            board.appendChild(cell);
        }
    }
    updateSettingsUI();
}

function handleTouchMove(e) {
    if (isPlayMode) { e.preventDefault(); return; } 
    if (!isMouseDown || boardLocked) return;
    e.preventDefault(); 
    let touch = e.touches[0];
    let el = document.elementFromPoint(touch.clientX, touch.clientY); 
    if (el && el.classList.contains('cell') && lastTouchCell !== el) { 
        let r = parseInt(el.dataset.r), c = parseInt(el.dataset.c);
        applyTool(r, c); lastTouchCell = el;
    }
}

document.addEventListener('mouseup', () => { isMouseDown = false; lastTouchCell = null; });
document.addEventListener('touchend', () => { isMouseDown = false; lastTouchCell = null; });
document.addEventListener('touchcancel', () => { isMouseDown = false; lastTouchCell = null; });

function setTool(tool, btnEl) {
    if (boardLocked) return;
    
    if (currentTool === tool) {
        currentTool = null;
        btnEl.classList.remove('active');
    } else {
        currentTool = tool;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btnEl.classList.add('active');
    }
}

function applyTool(r, c) {
    if (boardLocked || !currentTool) return; 
    
    if (currentTool === 'erase') {
        boardData.walls = boardData.walls.filter(b => b[0]!==r || b[1]!==c);
        boardData.start = boardData.start.filter(b => b[0]!==r || b[1]!==c);
        boardData.target = boardData.target.filter(b => b[0]!==r || b[1]!==c);
    } 
    else if (currentTool === 'wall') {
        boardData.walls = boardData.walls.filter(b => b[0]!==r || b[1]!==c);
        boardData.start = boardData.start.filter(b => b[0]!==r || b[1]!==c);
        boardData.target = boardData.target.filter(b => b[0]!==r || b[1]!==c);
        boardData.walls.push([r, c]);
    } 
    else if (currentTool === 'start') {
        boardData.walls = boardData.walls.filter(b => b[0]!==r || b[1]!==c);
        if (!boardData.start.some(b => b[0]===r && b[1]===c)) boardData.start.push([r, c, blockIdCounter++]); 
    } 
    else if (currentTool === 'target') {
        boardData.walls = boardData.walls.filter(b => b[0]!==r || b[1]!==c);
        if (!boardData.target.some(b => b[0]===r && b[1]===c)) boardData.target.push([r, c]);
    }
    drawBoard();
    if(stateLoaded) saveState();
}

function resetPlayState() {
    stopHistoryPlay();
    if (isPlayMode) {
        exitPlayMode(true);
    }
    unlockBoard();
}

function clearBoard() {
    customConfirm("Clear Board?", "Are you sure you want to clear all blocks and walls?", () => {
        resetPlayState();
        boardData = { walls: [], start: [], target: [] };
        blockIdCounter = 0;
        drawBoard();
        if(stateLoaded) saveState();
    });
}

function drawBoard() {
    const board = document.getElementById('game-board');
    document.querySelectorAll('.dynamic-block').forEach(el => el.remove());

    const addBlock = (r, c, classes) => {
        let el = document.createElement('div');
        el.className = `dynamic-block ${classes}`;
        el.style.top = `${PADDING + r * (CELL_SIZE + GAP)}px`;
        el.style.left = `${PADDING + c * (CELL_SIZE + GAP)}px`;
        board.appendChild(el);
        return el;
    };

    boardData.target.forEach(b => addBlock(b[0], b[1], 'target'));
    boardData.walls.forEach(b => addBlock(b[0], b[1], 'wall'));
    boardData.start.forEach((b) => {
        let el = addBlock(b[0], b[1], 'orange');
        el.id = `block-${b[2]}`;
        if (boardData.target.some(t => t[0]===b[0] && t[1]===b[1])) el.classList.add('on-target');
    });
}

function cloneBlocks(blocks) { return blocks.map(b => [...b]); }

function moveGroup(blocks, dr, dc, walls) {
    blocks.sort((a, b) => (dr !== 0) ? (dr === 1 ? b[0]-a[0] : a[0]-b[0]) : (dc === 1 ? b[1]-a[1] : a[1]-b[1]));
    let occupied = new Set(blocks.map(b => `${b[0]},${b[1]}`));
    
    for (let b of blocks) {
        let nr = b[0] + dr, nc = b[1] + dc;
        if (nr < 0 || nr >= 8 || nc < 0 || nc >= 8) continue;
        if (walls.some(w => w[0]===nr && w[1]===nc)) continue;
        
        occupied.delete(`${b[0]},${b[1]}`);
        if (!occupied.has(`${nr},${nc}`)) { b[0] = nr; b[1] = nc; occupied.add(`${nr},${nc}`); }
        else occupied.add(`${b[0]},${b[1]}`);
    }
}

// ==========================================
// 3. 遊玩模式 (Play Mode)
// ==========================================
// 判斷目前盤面是否過關
function checkCurrentWin() {
    if (boardData.start.length === 0 || boardData.target.length === 0) return false;
    return boardData.start.every(b => boardData.target.some(t => t[0]===b[0] && t[1]===b[1]));
}

function togglePlayMode() {
    if (isPlayMode) {
        customConfirm("Exit Play Mode?", "Your current play progress will be lost.", () => exitPlayMode());
    } else {
        enterPlayMode();
    }
}

function enterPlayMode() {
    if (boardData.start.length === 0 || boardData.target.length === 0) {
        customAlert("Error", "Missing start or target blocks."); return;
    }
    if (boardData.start.length !== boardData.target.length) {
        customAlert("Error", `Mismatch: Starts (${boardData.start.length}) != Targets (${boardData.target.length})`); return;
    }
    isPlayMode = true;
    playInitialState = cloneBlocks(boardData.start);
    playHistory = [];
    currentStepIndex = -1;
    
    lockBoard(); 
    document.querySelector('.left-panel').style.display = 'none'; 
    document.getElementById('edit-instructions').style.display = 'none';
    document.getElementById('play-panel').style.display = 'flex';
    
    renderPlayBoard();
    updateHistoryUI();
    
    let btn = document.getElementById('btn-play-mode');
    btn.innerText = "Exit Play Mode";
    btn.classList.replace('btn-primary', 'btn-danger');
    if(stateLoaded) saveState();
}

function exitPlayMode(force = false) {
    stopHistoryPlay();
    isPlayMode = false;
    boardData.start = cloneBlocks(playInitialState);
    
    document.querySelector('.left-panel').style.display = 'flex'; 
    document.getElementById('play-panel').style.display = 'none';
    document.getElementById('edit-instructions').style.display = 'flex';
    
    let btn = document.getElementById('btn-play-mode');
    btn.innerText = "Play Map";
    btn.classList.replace('btn-danger', 'btn-primary');
    
    // 移除發光特效
    const board = document.getElementById('game-board');
    board.style.borderColor = '';
    board.style.boxShadow = '';

    unlockBoard(); 
    drawBoard();
    if(stateLoaded) saveState();
}

async function playerMove(dr, dc, moveChar) {
    if (!isPlayMode || isPrompting) return;
    if (checkCurrentWin()) return; // 已經過關則鎖定盤面，禁止移動
    
    stopHistoryPlay(); 
    
    let current = cloneBlocks(boardData.start);
    moveGroup(current, dr, dc, boardData.walls);

    let changed = false;
    for (let i = 0; i < current.length; i++) {
        let oldBlock = boardData.start.find(b => b[2] === current[i][2]);
        if (oldBlock[0] !== current[i][0] || oldBlock[1] !== current[i][1]) {
            changed = true; break;
        }
    }
    if (!changed) return; 

    if (currentStepIndex < playHistory.length - 1) {
        isPrompting = true;
        let res = await showModal({
            title: "Overwrite History?", 
            msg: "You are making a move from a past state.\nThis will permanently delete your saved future steps. Continue?", 
            type: 'confirm'
        });
        isPrompting = false;
        
        if (!res) return; 
        playHistory = playHistory.slice(0, currentStepIndex + 1);
    }

    boardData.start = current;
    playHistory.push({ move: moveChar, state: cloneBlocks(current) });
    currentStepIndex++;
    
    renderPlayBoard();
    updateHistoryUI();
    checkWin();
    if(stateLoaded) saveState();
}

function playerUndo() {
    if (currentStepIndex > -1) jumpToStep(currentStepIndex - 1);
}

function playerRedo() {
    if (currentStepIndex < playHistory.length - 1) jumpToStep(currentStepIndex + 1);
}

function jumpToStep(index) {
    stopHistoryPlay();
    currentStepIndex = index;
    if (index === -1) {
        boardData.start = cloneBlocks(playInitialState);
    } else {
        boardData.start = cloneBlocks(playHistory[index].state);
    }
    renderPlayBoard();
    updateHistoryUI();
    if(stateLoaded) saveState();
}

function updateHistoryUI() {
    const container = document.getElementById('path-display');
    container.innerHTML = '';
    
    let startChip = document.createElement('div');
    startChip.className = 'path-chip start-chip'; 
    if (currentStepIndex === -1) startChip.classList.add('active');
    startChip.innerText = 'Start';
    startChip.onclick = () => jumpToStep(-1);
    container.appendChild(startChip);

    const arrows = { 'U': '↑', 'D': '↓', 'L': '←', 'R': '→' };

    playHistory.forEach((h, i) => {
        let chip = document.createElement('div');
        chip.className = 'path-chip';
        if (i === currentStepIndex) chip.classList.add('active');
        if (i > currentStepIndex) chip.classList.add('future'); 
        chip.innerText = `${i+1}. ${arrows[h.move]}`;
        chip.onclick = () => jumpToStep(i);
        container.appendChild(chip);
    });
    
    let activeChip = container.querySelector('.active');
    if (activeChip) {
        let scrollPos = activeChip.offsetTop - (container.clientHeight / 2) + (activeChip.clientHeight / 2);
        container.scrollTo({ top: Math.max(0, scrollPos), behavior: 'smooth' });
    }

    let indicator = document.getElementById('step-indicator');
    if (indicator) {
        // 更新顯示邏輯：始終顯示 步數/步數，過關時僅變色加粗
        indicator.innerText = `${currentStepIndex + 1} / ${playHistory.length}`;
        if (checkCurrentWin()) {
            indicator.style.color = 'var(--accent-primary)';
            indicator.style.fontWeight = 'bold';
        } else {
            indicator.style.color = 'var(--text-primary)';
            indicator.style.fontWeight = 'normal';
        }
    }
}

function renderPlayBoard() {
    let animSpeed = globalAnimSpeed;
    boardData.start.forEach((b) => {
        let el = document.getElementById(`block-${b[2]}`); 
        if(el) {
            if (animSpeed === 0) el.style.transition = 'none';
            else el.style.transition = `top ${animSpeed}ms ease-out, left ${animSpeed}ms ease-out, background-color 0.15s ease`;
            
            el.style.top = `${PADDING + b[0] * (CELL_SIZE + GAP)}px`;
            el.style.left = `${PADDING + b[1] * (CELL_SIZE + GAP)}px`;
            
            if (boardData.target.some(t => t[0]===b[0] && t[1]===b[1])) { el.classList.add('on-target'); } 
            else { el.classList.remove('on-target'); }
        }
    });

    // 過關狀態視覺回饋 (盤面發光)
    const board = document.getElementById('game-board');
    if (isPlayMode && checkCurrentWin()) {
        board.style.borderColor = 'var(--accent-primary)';
        board.style.boxShadow = '0 0 20px rgba(95, 168, 235, 0.3)';
    } else {
        board.style.borderColor = '';
        board.style.boxShadow = '';
    }
}

function checkWin() {
    if (checkCurrentWin()) {
        let path = playHistory.map(h => h.move).join(' → ');
        setTimeout(() => {
            customAlert("Puzzle Solved!", `Congratulations! You solved it in ${playHistory.length} steps.\n\nPath:\n${path}`);
        }, globalAnimSpeed + 50);
    }
}

// 玩家足跡自動回放邏輯
function updateSpeed() {
    let val = parseFloat(document.getElementById('speed-slider').value);
    playDelay = 300 / val;
    document.getElementById('speed-label').innerText = val.toFixed(2) + 'x';

    if (playHistoryTimer) { clearTimeout(playHistoryTimer); startHistoryPlayLoop(); }
}

function toggleHistoryPlay() {
    let btn = document.getElementById('btn-history-play');
    if (playHistoryTimer) { 
        stopHistoryPlay(); 
    } else {
        btn.innerText = 'Pause Replay'; btn.classList.remove('btn-primary');
        if (currentStepIndex === playHistory.length - 1) {
            currentStepIndex = -1;
            boardData.start = cloneBlocks(playInitialState);
            renderPlayBoard();
            updateHistoryUI();
        }
        startHistoryPlayLoop();
    }
}

function startHistoryPlayLoop() {
    playHistoryTimer = setTimeout(() => {
        if (currentStepIndex < playHistory.length - 1) { 
            currentStepIndex++;
            boardData.start = cloneBlocks(playHistory[currentStepIndex].state);
            renderPlayBoard();
            updateHistoryUI();
            startHistoryPlayLoop(); 
        } else { 
            stopHistoryPlay(); 
        }
    }, playDelay);
}

function stopHistoryPlay() { 
    if (playHistoryTimer) {
        clearTimeout(playHistoryTimer); 
        playHistoryTimer = null; 
    }
    let btn = document.getElementById('btn-history-play');
    if(btn) { btn.innerText = 'Auto Replay'; btn.classList.add('btn-primary'); }
}

document.addEventListener('keydown', (e) => {
    if (!isPlayMode) return;
    if (['ArrowUp', 'w', 'W'].includes(e.key)) { e.preventDefault(); playerMove(-1, 0, 'U'); }
    else if (['ArrowDown', 's', 'S'].includes(e.key)) { e.preventDefault(); playerMove(1, 0, 'D'); }
    else if (['ArrowLeft', 'a', 'A'].includes(e.key)) { e.preventDefault(); playerMove(0, -1, 'L'); }
    else if (['ArrowRight', 'd', 'D'].includes(e.key)) { e.preventDefault(); playerMove(0, 1, 'R'); }
    else if (e.key === 'z' && e.ctrlKey) playerUndo();
});

let touchStartX = 0, touchStartY = 0;
document.getElementById('game-board').addEventListener('touchstart', e => {
    if(!isPlayMode) return;
    touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY;
}, {passive: true});

document.getElementById('game-board').addEventListener('touchend', e => {
    if(!isPlayMode) return;
    let dx = e.changedTouches[0].screenX - touchStartX;
    let dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 0) playerMove(0, 1, 'R'); else playerMove(0, -1, 'L');
        } else {
            if (dy > 0) playerMove(1, 0, 'D'); else playerMove(-1, 0, 'U');
        }
    }
}, {passive: true});

// ==========================================
// 4. 地圖代碼匯出匯入
// ==========================================
function copyMapText() {
    let grid = Array.from({length: 8}, () => Array(8).fill(0));
    boardData.walls.forEach(w => grid[w[0]][w[1]] = 1);
    boardData.target.forEach(w => grid[w[0]][w[1]] = 3);
    boardData.start.forEach(w => {
        if (grid[w[0]][w[1]] === 3) grid[w[0]][w[1]] = 4;
        else grid[w[0]][w[1]] = 2;
    });
    navigator.clipboard.writeText(grid.map(r => r.join('')).join('\n'))
        .then(()=> customAlert("Success", "Map code copied to clipboard!"));
}

function importMapText() {
    customPrompt("Import Map", "Paste map code (64 digits, 0=Empty, 1=Wall, 2=Start, 3=Target, 4=Overlap):", (input) => {
        let cl = input.replace(/\s+/g, '');
        if (cl.length !== 64 || !/^[0-4]+$/.test(cl)) { customAlert("Error", "Invalid format!"); return; }
        
        resetPlayState(); 
        boardData = { walls: [], start: [], target: [] }; blockIdCounter = 0;
        for (let i=0; i<64; i++) {
            let r = Math.floor(i/8), c = i%8, v = cl[i];
            if (v==='1') boardData.walls.push([r, c]);
            else if (v==='2') boardData.start.push([r, c, blockIdCounter++]);
            else if (v==='3') boardData.target.push([r, c]);
            else if (v==='4') {
                boardData.target.push([r, c]);
                boardData.start.push([r, c, blockIdCounter++]);
            }
        }
        drawBoard();
        if(stateLoaded) saveState();
    });
}

window.onload = () => { 
    initBoard(); 
    loadState(); 
    stateLoaded = true;
    drawBoard(); 
    
    if (isPlayMode) {
        lockBoard();
        document.querySelector('.left-panel').style.display = 'none'; 
        document.getElementById('edit-instructions').style.display = 'none';
        document.getElementById('play-panel').style.display = 'flex';
        renderPlayBoard();
        updateHistoryUI();
        let btn = document.getElementById('btn-play-mode');
        btn.innerText = "Exit Play Mode";
        btn.classList.replace('btn-primary', 'btn-danger');
    }
};
