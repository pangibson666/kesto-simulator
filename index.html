<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kesto 模擬器 V1.82</title>
<style>
  body {
    background-color: #121212;
    color: #ffffff;
    font-family: sans-serif;
    display: flex;
    justify-content: center; 
    align-items: center;     
    min-height: 100vh;       
    margin: 0;
    padding: 0;
    touch-action: none;
    user-select: none;
    overflow: hidden;        
  }

  #app-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-origin: center center; 
    width: 380px;  
    height: 550px; /* 微調高度以容納複製/匯入按鈕 */
  }

  .header {
    display: flex;
    flex-direction: column;
    width: 368px;
    margin-bottom: 10px;
    gap: 8px;
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
  }
  .title {
    font-size: 24px;
    font-weight: bold;
    white-space: nowrap; 
  }
  .controls-row {
    display: flex;
    gap: 5px;
    width: 100%;
    justify-content: space-between;
  }
  button, select {
    background-color: #333;
    color: white;
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  button:active { background-color: #555; }
  select { outline: none; }
  
  #editor-toolbar {
    display: none;
    background-color: #222;
    padding: 8px;
    border-radius: 6px;
    width: 352px;
    margin-bottom: 10px;
    justify-content: space-between;
    align-items: center;
    border: 1px dashed #fca33d;
  }
  .tool-group { display: flex; gap: 4px; }
  .tool-btn { border: 2px solid transparent; }
  .tool-btn.active { border-color: #fff; font-weight: bold; }
  #btn-tool-wall { background-color: #555; }
  #btn-tool-start { background-color: #fca33d; color: #000; }
  #btn-tool-target { background-color: #4287f5; }

  #game-board {
    display: grid;
    grid-template-columns: repeat(8, 40px);
    grid-template-rows: repeat(8, 40px);
    gap: 4px;
    background-color: #1a1a1a;
    padding: 10px;
    border-radius: 8px;
    position: relative;
  }
  .cell {
    width: 40px;
    height: 40px;
    background-color: #2a2a2a;
    border-radius: 4px;
  }
  .cell.edit-hover:hover { background-color: #3a3a3a; }
  
  .block {
    position: absolute;
    width: 40px;
    height: 40px;
    border-radius: 4px;
    box-sizing: border-box;
    pointer-events: none;
  }
  
  .orange { background-color: #fca33d; z-index: 20; }
  .orange.on-target { background-color: #4287f5; }

  .blue {
    border: 3px dashed #4287f5;
    background-color: rgba(66, 135, 245, 0.1);
    z-index: 10;
  }
  .gray { background-color: #555555; z-index: 15; }
  
  .modal {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.85);
    z-index: 100;
    border-radius: 8px;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  .modal-content { text-align: center; padding: 20px; }
  .modal-title { color: #fca33d; font-size: 28px; font-weight: bold; margin-bottom: 10px; }
  .modal-text { font-size: 16px; color: #aaa; margin-bottom: 20px; }
  .modal-buttons { display: flex; gap: 15px; justify-content: center; }
  .modal-buttons button { padding: 10px 20px; font-size: 16px; font-weight: bold; }
  .btn-replay { background-color: #555; color: white; }
  .btn-next { background-color: #4287f5; color: white; }
</style>
</head>
<body>

<div id="app-container">
  <div class="header">
    <div class="top-row">
      <div class="title">Kesto <span id="step-counter" style="font-size:16px; color:#aaa; margin-left:10px;">0 步</span></div>
      <div style="display:flex; gap:5px;">
        <select id="anim-select" onchange="updateAnimSpeed()">
          <option value="0">無動畫</option>
          <option value="100">動畫: 快</option>
          <option value="150" selected>動畫: 中</option>
          <option value="300">動畫: 慢</option>
        </select>
        <select id="difficulty-select" onchange="generateLevel()">
          <option value="easy">簡單 (5-7步)</option>
          <option value="medium" selected>普通 (8-13步)</option>
          <option value="hard">困難 (14-20步🔥)</option>
        </select>
      </div>
    </div>
    <div class="controls-row">
      <select id="history-select" onchange="loadSelectedHistory(this.value)">
        <option value="-1">-- 歷史關卡 --</option>
      </select>
      <div style="display:flex; gap:3px;">
        <button onclick="undo()">⟲ 復原</button>
        <button onclick="resetLevel()">↻ 重置</button>
        <button id="btn-edit-mode" onclick="toggleEditMode()" style="background-color:#5c3da6;">🛠️ 設計</button>
        <button id="btn-next-level" onclick="triggerNextLevel()" style="background-color:#4287f5;">換一關</button>
      </div>
    </div>
    <!-- 新增：地圖分享控制列 -->
    <div style="display:flex; gap:5px; width:100%; justify-content:space-between; margin-top:2px;">
      <button onclick="copyMapText()" style="flex:1; background-color:#3a86c8; padding: 4px 6px; font-size:12px;">📋 複製地圖代碼</button>
      <button onclick="importMapText()" style="flex:1; background-color:#555; padding: 4px 6px; font-size:12px;">📥 匯入地圖代碼</button>
    </div>
  </div>

  <div id="editor-toolbar">
    <div class="tool-group">
      <button id="btn-tool-wall" class="tool-btn active" onclick="setTool('wall')">牆壁</button>
      <button id="btn-tool-start" class="tool-btn" onclick="setTool('start')">橘起點</button>
      <button id="btn-tool-target" class="tool-btn" onclick="setTool('target')">藍終點</button>
    </div>
    <div style="display:flex; gap:4px;">
      <button onclick="clearEditor()" style="background-color:#a63d3d;">清空</button>
      <button onclick="finishEditing()" style="background-color:#3da65c; font-weight:bold;">完成</button>
    </div>
  </div>

  <div id="game-board">
    <div id="win-modal" class="modal">
      <div class="modal-content">
        <div class="modal-title">太神啦！🎉</div>
        <div id="modal-step-text" class="modal-text">你用了 0 步成功通關！</div>
        <div id="modal-optimal-text" style="font-size:14px; color:#66e066; margin-bottom:15px;"></div>
        <div class="modal-buttons">
          <button class="btn-replay" onclick="closeModalAndReplay()">再玩一次</button>
          <button class="btn-next" onclick="closeModalAndNext()">下一關</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const GRID_SIZE = 8;
  const CELL_SIZE = 40;
  const GAP = 4;
  const PADDING = 10;
  
  let initialOrangeBlocks = [];
  let targetBlueBlocks = []; 
  let initialWalls = [];

  let orangeBlocks = [];
  let walls = [];
  let stepCount = 0;
  let history = [];
  let savedLevels = [];

  let isEditMode = false;
  let currentEditTool = 'wall';

  let animDuration = 150;
  let isAnimating = false;
  
  let cachedOptimalSteps = 0;

  function adjustScale() {
    const container = document.getElementById('app-container');
    const baseWidth = 380;  
    const baseHeight = 550; 
    
    const scaleX = window.innerWidth / baseWidth;
    const scaleY = window.innerHeight / baseHeight;
    let scale = Math.min(scaleX, scaleY) * 0.95;
    
    scale = Math.min(scale, 2.5); 
    
    container.style.transform = `scale(${scale})`;
  }

  window.addEventListener('resize', adjustScale);

  function initBoard() {
    const board = document.getElementById('game-board');
    for (let i = 0; i < 64; i++) {
      let cell = document.createElement('div');
      cell.className = 'cell';
      let r = Math.floor(i / GRID_SIZE);
      let c = i % GRID_SIZE;
      cell.onclick = () => handleCellClick(r, c);
      board.appendChild(cell);
    }
    updateAnimSpeed();
    generateLevel(); 
  }

  function updateAnimSpeed() { animDuration = parseInt(document.getElementById('anim-select').value); }
  function getPixel(pos) { return PADDING + pos * (CELL_SIZE + GAP); }

  function draw() {
    const board = document.getElementById('game-board');
    document.querySelectorAll('.dynamic').forEach(el => el.remove());

    targetBlueBlocks.forEach(b => {
      let el = document.createElement('div');
      el.className = 'block blue dynamic';
      el.style.top = getPixel(b.r) + 'px';
      el.style.left = getPixel(b.c) + 'px';
      board.appendChild(el);
    });

    walls.forEach(w => {
      let el = document.createElement('div');
      el.className = 'block gray dynamic';
      el.style.top = getPixel(w[0]) + 'px';
      el.style.left = getPixel(w[1]) + 'px';
      board.appendChild(el);
    });

    orangeBlocks.forEach(b => {
      let el = document.createElement('div');
      el.className = 'block orange dynamic';
      el.id = `orange-block-${b.id}`; 
      el.style.transition = `top ${animDuration}ms ease-out, left ${animDuration}ms ease-out, background-color ${animDuration}ms ease`;
      el.style.top = getPixel(b.r) + 'px';
      el.style.left = getPixel(b.c) + 'px';
      
      if (targetBlueBlocks.some(tb => tb.r === b.r && tb.c === b.c)) {
        el.classList.add('on-target');
      }
      board.appendChild(el);
    });

    document.getElementById('step-counter').innerText = stepCount + ' 步';
  }

  function cloneBlocks(blocks) { return blocks.map(b => ({id: b.id, r: b.r, c: b.c})); }

  function moveGroup(blocks, dr, dc, currentWalls) {
    blocks.sort((a, b) => {
      if (dr !== 0) return dr === 1 ? b.r - a.r : a.r - b.r;
      if (dc !== 0) return dc === 1 ? b.c - a.c : a.c - b.c;
      return 0;
    });

    let currentOccupied = new Set(blocks.map(b => `${b.r},${b.c}`));
    let moved = false;

    for (let block of blocks) {
      let nr = block.r + dr;
      let nc = block.c + dc;
      if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) continue;
      if (currentWalls.some(w => w[0] === nr && w[1] === nc)) continue;
      
      currentOccupied.delete(`${block.r},${block.c}`);
      if (currentOccupied.has(`${nr},${nc}`)) {
        currentOccupied.add(`${block.r},${block.c}`);
      } else {
        block.r = nr;
        block.c = nc;
        currentOccupied.add(`${nr},${nc}`);
        moved = true;
      }
    }
    return moved;
  }

  // 極速版：雙向廣度優先搜尋 (Bidirectional BFS)
  function findOptimalStepsBiDir(startBlocks, targetBlocks, currentWalls) {
    const getBigIntKey = (b) => {
      let key = 0n;
      for (let i = 0; i < b.length; i++) {
        key |= 1n << BigInt((b[i].r << 3) | b[i].c);
      }
      return key;
    };

    let startKey = getBigIntKey(startBlocks);
    let targetKey = getBigIntKey(targetBlocks);
    if (startKey === targetKey) return 0;

    let queueA = [ { blocks: cloneBlocks(startBlocks), steps: 0 } ];
    let queueB = [ { blocks: cloneBlocks(targetBlocks), steps: 0 } ];
    
    let headA = 0, headB = 0;

    let visitedA = new Map(); visitedA.set(startKey, 0);
    let visitedB = new Map(); visitedB.set(targetKey, 0);

    let maxNodes = 80000; 
    let nodes = 0;
    let dirs = [[-1,0], [1,0], [0,-1], [0,1]];

    while (headA < queueA.length && headB < queueB.length && nodes < maxNodes) {
      // 1. 擴展 Queue A
      let currA = queueA[headA++];
      nodes++;
      if (currA.steps < 15) { 
        for (let d of dirs) {
          let next = cloneBlocks(currA.blocks);
          if (moveGroup(next, d[0], d[1], currentWalls)) {
            let key = getBigIntKey(next);
            if (visitedB.has(key)) return currA.steps + 1 + visitedB.get(key); 
            if (!visitedA.has(key)) {
              visitedA.set(key, currA.steps + 1);
              queueA.push({ blocks: next, steps: currA.steps + 1 });
            }
          }
        }
      }

      // 2. 擴展 Queue B
      let currB = queueB[headB++];
      nodes++;
      if (currB.steps < 15) {
        for (let d of dirs) {
          let next = cloneBlocks(currB.blocks);
          if (moveGroup(next, d[0], d[1], currentWalls)) {
            let key = getBigIntKey(next);
            if (visitedA.has(key)) return currB.steps + 1 + visitedA.get(key); 
            if (!visitedB.has(key)) {
              visitedB.set(key, currB.steps + 1);
              queueB.push({ blocks: next, steps: currB.steps + 1 });
            }
          }
        }
      }
    }
    return -1; 
  }

  function move(dr, dc) {
    if (isEditMode || document.getElementById('win-modal').style.display === 'flex' || isAnimating) return;
    
    let nextOr = cloneBlocks(orangeBlocks);
    let movedOr = moveGroup(nextOr, dr, dc, walls);

    if (movedOr) {
      history.push({ orange: cloneBlocks(orangeBlocks), step: stepCount });
      orangeBlocks = nextOr;
      stepCount++;
      document.getElementById('step-counter').innerText = stepCount + ' 步';

      if (animDuration > 0) {
        isAnimating = true;
        orangeBlocks.forEach(b => {
          let el = document.getElementById(`orange-block-${b.id}`);
          if(el) {
            el.style.transition = `top ${animDuration}ms ease-out, left ${animDuration}ms ease-out, background-color ${animDuration}ms ease`;
            el.style.top = getPixel(b.r) + 'px';
            el.style.left = getPixel(b.c) + 'px';
            if (targetBlueBlocks.some(tb => tb.r === b.r && tb.c === b.c)) {
              el.classList.add('on-target');
            } else {
              el.classList.remove('on-target');
            }
          }
        });
        setTimeout(() => {
          isAnimating = false;
          checkWin();
        }, animDuration);
      } else {
        draw();
        setTimeout(checkWin, 50);
      }
    }
  }

  function undo() {
    if (isEditMode || document.getElementById('win-modal').style.display === 'flex' || isAnimating) return;
    if (history.length > 0) {
      let lastState = history.pop();
      orangeBlocks = cloneBlocks(lastState.orange);
      stepCount = lastState.step;
      draw();
    }
  }

  function resetLevel() {
    if (isAnimating) return;
    orangeBlocks = cloneBlocks(initialOrangeBlocks);
    walls = [...initialWalls];
    stepCount = 0;
    history = [];
    draw();
  }

  function saveCurrentLevelToHistory() {
    if (initialOrangeBlocks.length === 0 || isEditMode) return;
    let isDuplicate = savedLevels.some(lvl => 
      JSON.stringify(lvl.walls) === JSON.stringify(initialWalls) &&
      JSON.stringify(lvl.orange.map(b => ({r: b.r, c: b.c}))) === JSON.stringify(initialOrangeBlocks.map(b => ({r: b.r, c: b.c})))
    );

    if (!isDuplicate) {
      savedLevels.push({
        orange: cloneBlocks(initialOrangeBlocks),
        blue: cloneBlocks(targetBlueBlocks),
        walls: [...initialWalls],
        optimal: cachedOptimalSteps 
      });
      let select = document.getElementById('history-select');
      let opt = document.createElement('option');
      opt.value = savedLevels.length - 1;
      opt.innerText = `關卡 ${savedLevels.length} (${document.getElementById('difficulty-select').value.toUpperCase()})`;
      select.appendChild(opt);
    }
  }

  function loadSelectedHistory(index) {
    if(isAnimating) return;
    let idx = parseInt(index);
    if (idx >= 0 && idx < savedLevels.length) {
      if(isEditMode) toggleEditMode();
      let lvl = savedLevels[idx];
      initialOrangeBlocks = cloneBlocks(lvl.orange);
      targetBlueBlocks = cloneBlocks(lvl.blue);
      initialWalls = [...lvl.walls];
      cachedOptimalSteps = lvl.optimal; 
      resetLevel();
    }
    document.getElementById('history-select').value = "-1";
  }

  function checkWin() {
    let oStr = orangeBlocks.map(b => `${b.r},${b.c}`).sort().join('|');
    let bStr = targetBlueBlocks.map(b => `${b.r},${b.c}`).sort().join('|');
    if (oStr === bStr) {
      document.getElementById('modal-step-text').innerText = `你用了 ${stepCount} 步成功通關！`;
      document.getElementById('modal-optimal-text').innerText = `AI 參考步數：${cachedOptimalSteps === -1 ? '未知' : cachedOptimalSteps} 步`;
      document.getElementById('win-modal').style.display = 'flex';
      saveCurrentLevelToHistory();
    }
  }

  function triggerNextLevel() {
    if(isAnimating) return;
    saveCurrentLevelToHistory();
    generateLevel();
  }

  function closeModalAndReplay() {
    document.getElementById('win-modal').style.display = 'none';
    resetLevel();
  }

  function closeModalAndNext() {
    document.getElementById('win-modal').style.display = 'none';
    generateLevel();
  }

  function generateRandomHexominoOffsets() {
    const numBlocks = 6;
    let blocks = [{r: 0, c: 0}];
    let set = new Set(["0,0"]);

    while (blocks.length < numBlocks) {
      let possibleNeighbors = [];
      for (let b of blocks) {
        const dirs = [[-1,0], [1,0], [0,-1], [0,1]];
        for (let d of dirs) {
          let nr = b.r + d[0];
          let nc = b.c + d[1];
          let key = `${nr},${nc}`;
          if (!set.has(key)) possibleNeighbors.push({r: nr, c: nc});
        }
      }
      if (possibleNeighbors.length === 0) break; 
      let nextBlock = possibleNeighbors[Math.floor(Math.random() * possibleNeighbors.length)];
      blocks.push(nextBlock);
      set.add(`${nextBlock.r},${nextBlock.c}`);
    }

    let minR = Math.min(...blocks.map(b => b.r));
    let minC = Math.min(...blocks.map(b => b.c));
    return blocks.map(b => [b.r - minR, b.c - minC]);
  }

  // 隨機漫步 + 雙向BFS認證機制
  function generateLevel() {
    if(isEditMode) toggleEditMode();
    document.getElementById('step-counter').innerText = 'AI 運算中...';
    
    let diff = document.getElementById('difficulty-select').value;
    
    let minSteps = 5, maxSteps = 7, numWalls = 4;
    if (diff === 'medium') { minSteps = 8; maxSteps = 13; numWalls = 6; }
    else if (diff === 'hard') { minSteps = 14; maxSteps = 20; numWalls = 8; }

    setTimeout(() => {
      let maxMapAttempts = 200; 
      let success = false;

      for (let attempt = 0; attempt < maxMapAttempts; attempt++) {
        // 1. 生成牆壁
        let currentWalls = [];
        while (currentWalls.length < numWalls) {
          let wr = Math.floor(Math.random() * 8);
          let wc = Math.floor(Math.random() * 8);
          if (!currentWalls.some(w => w[0] === wr && w[1] === wc)) currentWalls.push([wr, wc]);
        }
        
        // 2. 隨機生成起點形狀
        const currentOffsets = generateRandomHexominoOffsets();
        let shapeRows = Math.max(...currentOffsets.map(o => o[0])) + 1;
        let shapeCols = Math.max(...currentOffsets.map(o => o[1])) + 1;
        let sr = Math.floor(Math.random() * (8 - shapeRows + 1));
        let sc = Math.floor(Math.random() * (8 - shapeCols + 1));

        let startBlocks = [];
        let validStart = true;
        for (let i = 0; i < currentOffsets.length; i++) {
          let r = sr + currentOffsets[i][0];
          let c = sc + currentOffsets[i][1];
          if (currentWalls.some(w => w[0] === r && w[1] === c)) { validStart = false; break; }
          startBlocks.push({ id: i, r, c });
        }
        if (!validStart) continue;

        // 3. 正向拓撲：瘋狂隨機漫步
        let targetBlocks = cloneBlocks(startBlocks);
        let dirs = [[-1,0], [1,0], [0,-1], [0,1]];
        let walkCount = 0;
        let targetWalks = maxSteps * 3; 
        let lastDirIdx = -1;

        for(let w = 0; w < 150 && walkCount < targetWalks; w++) {
            let possibleDirs = [0, 1, 2, 3].filter(i => {
                if (lastDirIdx === 0 && i === 1) return false;
                if (lastDirIdx === 1 && i === 0) return false;
                if (lastDirIdx === 2 && i === 3) return false;
                if (lastDirIdx === 3 && i === 2) return false;
                return true;
            });
            possibleDirs.sort(() => Math.random() - 0.5); 
            
            let moved = false;
            for(let i of possibleDirs) {
                let d = dirs[i];
                let testBlocks = cloneBlocks(targetBlocks);
                if (moveGroup(testBlocks, d[0], d[1], currentWalls)) {
                    targetBlocks = testBlocks;
                    lastDirIdx = i;
                    walkCount++;
                    moved = true;
                    break;
                }
            }
            if(!moved) lastDirIdx = -1; 
        }

        // 4. 重疊檢查
        let hasOverlap = false;
        const startCoords = new Set(startBlocks.map(b => `${b.r},${b.c}`));
        for (let tb of targetBlocks) {
          if (startCoords.has(`${tb.r},${tb.c}`)) {
            hasOverlap = true;
            break;
          }
        }
        if (hasOverlap) continue;

        // 5. 雙向 BFS 驗證真實最少步數
        let optimal = findOptimalStepsBiDir(startBlocks, targetBlocks, currentWalls);
        
        if (optimal >= minSteps && optimal <= maxSteps) {
          initialOrangeBlocks = cloneBlocks(startBlocks);
          targetBlueBlocks = cloneBlocks(targetBlocks); 
          initialWalls = currentWalls;
          walls = [...currentWalls];
          cachedOptimalSteps = optimal;
          resetLevel();
          success = true;
          break;
        }
      }
      
      if (!success) {
        generateLevel();
      }
    }, 50);
  }

  // ==========================================
  // 新增功能：將當前地圖資料複製成 8x8 代碼字串
  // 0=空格, 1=障礙物, 2=方塊(橘起點), 3=目的地(藍終點)
  // ==========================================
  function copyMapText() {
    if (initialOrangeBlocks.length === 0 && targetBlueBlocks.length === 0 && initialWalls.length === 0) {
      alert("目前沒有可導出的地圖資料！");
      return;
    }

    // 初始化 8x8 的二維陣列
    let grid = Array.from({ length: 8 }, () => Array(8).fill(0));

    // 1. 填入牆壁 (1)
    initialWalls.forEach(([r, c]) => {
      if (r >= 0 && r < 8 && c >= 0 && c < 8) grid[r][c] = 1;
    });

    // 2. 填入藍終點 (3)
    targetBlueBlocks.forEach(b => {
      if (b.r >= 0 && b.r < 8 && b.c >= 0 && b.c < 8) grid[b.r][b.c] = 3;
    });

    // 3. 填入橘起點 (2) -> 起點蓋在終點上方
    initialOrangeBlocks.forEach(b => {
      if (b.r >= 0 && b.r < 8 && b.c >= 0 && b.c < 8) grid[b.r][b.c] = 2;
    });

    // 組合文字
    let mapStr = grid.map(row => row.join('')).join('\n');

    // 寫入剪貼簿
    navigator.clipboard.writeText(mapStr).then(() => {
      alert("地圖代碼已成功複製到剪貼簿！\n\n" + mapStr);
    }).catch(() => {
      // 備用複製方案 (相容不支援 navigator.clipboard 的瀏覽器)
      let textArea = document.createElement("textarea");
      textArea.value = mapStr;
      document.body.appendChild(textArea);
      textArea.select();
      try {
        document.execCommand('copy');
        alert("地圖代碼已成功複製到剪貼簿！\n\n" + mapStr);
      } catch (err) {
        alert("複製失敗，請手動複製以下地圖代碼：\n\n" + mapStr);
      }
      document.body.removeChild(textArea);
    });
  }

  // ==========================================
  // 新增功能：匯入 8x8 地圖代碼字串並進行 AI 步數驗證
  // ==========================================
  function importMapText() {
    let input = prompt("請貼上 8x8 地圖代碼 (共 64 位數字)：");
    if (!input) return;

    // 清除空白字元及換行
    let cleaned = input.replace(/\s+/g, '');
    if (cleaned.length !== 64 || !/^[0-3]+$/.test(cleaned)) {
      alert("匯入失敗！請確保代碼是 8x8 共 64 位數（只能含有數字 0、1、2、3）。");
      return;
    }

    let tempWalls = [];
    let tempStart = [];
    let tempTarget = [];
    let orangeCount = 0;

    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        let val = cleaned[r * 8 + c];
        if (val === '1') {
          tempWalls.push([r, c]);
        } else if (val === '2') {
          tempStart.push({ id: `imported-${Date.now()}-${orangeCount++}`, r, c });
        } else if (val === '3') {
          tempTarget.push({ r, c });
        }
      }
    }

    if (tempStart.length === 0 || tempTarget.length === 0) {
      alert("匯入失敗！地圖中必須至少含有一個橘起點(2)與藍終點(3)。");
      return;
    }
    if (tempStart.length !== tempTarget.length) {
      alert(`⚠️ 注意：起點數量 (${tempStart.length}) 與終點數量 (${tempTarget.length}) 不符，可能無法正常過關。`);
    }

    document.getElementById('step-counter').innerText = 'AI 驗證中...';
    
    // 背景執行雙向快速步數演算
    setTimeout(() => {
      let trueOptimal = findOptimalStepsBiDir(tempStart, tempTarget, tempWalls);
      
      initialWalls = tempWalls;
      initialOrangeBlocks = tempStart;
      targetBlueBlocks = tempTarget;
      cachedOptimalSteps = trueOptimal;

      resetLevel(); // 渲染地圖
      
      if (trueOptimal === -1) {
        alert("匯入成功！但 AI 評估此地圖可能極度困難或無解，請嘗試挑戰看看！");
      } else {
        alert(`匯入成功！AI 參考步數為：${trueOptimal} 步！`);
      }
    }, 50);
  }

  function toggleEditMode() {
    if (isAnimating) return;
    isEditMode = !isEditMode;
    const toolbar = document.getElementById('editor-toolbar');
    const editBtn = document.getElementById('btn-edit-mode');
    const cells = document.querySelectorAll('.cell');

    if (isEditMode) {
      toolbar.style.display = 'flex';
      editBtn.innerText = '❌ 放棄';
      editBtn.style.backgroundColor = '#a63d3d';
      cells.forEach(c => c.classList.add('edit-hover'));
    } else {
      toolbar.style.display = 'none';
      editBtn.innerText = '🛠️ 設計';
      editBtn.style.backgroundColor = '#5c3da6';
      cells.forEach(c => c.classList.remove('edit-hover'));
      resetLevel();
    }
  }

  function setTool(tool) {
    currentEditTool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-tool-${tool}`).classList.add('active');
  }

  function handleCellClick(r, c) {
    if (!isEditMode) return;
    let hadWall = initialWalls.some(w => w[0] === r && w[1] === c);
    let hadStart = initialOrangeBlocks.some(b => b.r === r && b.c === c);
    let hadTarget = targetBlueBlocks.some(b => b.r === r && b.c === c);

    if ((currentEditTool === 'wall' && hadWall) || 
        (currentEditTool === 'start' && hadStart) || 
        (currentEditTool === 'target' && hadTarget)) {
      initialWalls = initialWalls.filter(w => w[0] !== r || w[1] !== c);
      initialOrangeBlocks = initialOrangeBlocks.filter(b => b.r !== r || b.c !== c);
      targetBlueBlocks = targetBlueBlocks.filter(b => b.r !== r || b.c !== c);
      resetLevel(); return;
    }

    initialWalls = initialWalls.filter(w => w[0] !== r || w[1] !== c);
    initialOrangeBlocks = initialOrangeBlocks.filter(b => b.r !== r || b.c !== c);
    targetBlueBlocks = targetBlueBlocks.filter(b => b.r !== r || b.c !== c);

    if (currentEditTool === 'wall') initialWalls.push([r, c]);
    else if (currentEditTool === 'start') initialOrangeBlocks.push({ id: `custom-${Date.now()}-${Math.floor(Math.random()*1000)}`, r, c });
    else if (currentEditTool === 'target') targetBlueBlocks.push({ r, c });
    resetLevel();
  }

  function clearEditor() {
    initialWalls = []; initialOrangeBlocks = []; targetBlueBlocks = [];
    resetLevel();
  }

  function finishEditing() {
    if (initialOrangeBlocks.length === 0 || targetBlueBlocks.length === 0) {
      alert('必須至少放置一個橘起點和藍終點！'); return;
    }
    if (initialOrangeBlocks.length !== targetBlueBlocks.length) {
      alert(`數量不匹配！你放了 ${initialOrangeBlocks.length} 個起點，但有 ${targetBlueBlocks.length} 個終點。`); return;
    }
    document.getElementById('step-counter').innerText = 'AI 驗證中...';
    setTimeout(() => {
      let trueOptimal = findOptimalStepsBiDir(initialOrangeBlocks, targetBlueBlocks, initialWalls);
      if (trueOptimal === -1) {
        alert('⚠️ 提示：此自訂關卡極度困難或無解，已為你保留地圖，請嘗試挑戰！');
        cachedOptimalSteps = -1;
      } else {
        alert(`驗證成功！AI 參考步數：${trueOptimal} 步！`);
        cachedOptimalSteps = trueOptimal; 
      }
      toggleEditMode();
    }, 50);
  }

  window.addEventListener('keydown', (e) => {
    if (['ArrowUp', 'w', 'W'].includes(e.key)) { move(-1, 0); e.preventDefault(); }
    if (['ArrowDown', 's', 'S'].includes(e.key)) { move(1, 0); e.preventDefault(); }
    if (['ArrowLeft', 'a', 'A'].includes(e.key)) { move(0, -1); e.preventDefault(); }
    if (['ArrowRight', 'd', 'D'].includes(e.key)) { move(0, 1); e.preventDefault(); }
    if (['z', 'Z'].includes(e.key)) undo();
    if (['r', 'R'].includes(e.key)) resetLevel();
  });

  let touchStartX = 0, touchStartY = 0;
  document.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, {passive: false});

  document.addEventListener('touchend', e => {
    let dx = e.changedTouches[0].screenX - touchStartX;
    let dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) move(0, dx > 0 ? 1 : -1);
    else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 30) move(dy > 0 ? 1 : -1, 0);
  }, {passive: false});

  document.addEventListener('touchmove', e => {
    if(!['BUTTON', 'SELECT'].includes(e.target.tagName)) e.preventDefault();
  }, {passive: false});

  window.onload = () => {
    initBoard();
    adjustScale();
  };
</script>
</body>
